<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool "this" Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f2f5;
        gap: 20px;
      }
      .box {
        width: 150px;
        height: 150px;
        background-color: rgb(109, 109, 237);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="box" onclick="handleClick(this)">Box 1<br />Click Me</div>
    <div class="box" onclick="handleClick(this)">Box 2<br />Click Me</div>
    <div class="box" onclick="handleClick(this)">Box 3<br />Click Me</div>

    <script>
      function handleClick(element) {
        const allBox = document.querySelectorAll(".box");

        allBox.forEach((box, index) => {
          box.style.backgroundColor = "rgb(109, 109, 237)";
          box.style.transform = "scale(1)";
          box.innerHTML = `Box ${index + 1}<br />Click Me`;
        });

        const randomColor =
          "#" + Math.floor(Math.random() * 16777215).toString(16);

        element.style.backgroundColor = randomColor;
        element.style.transform = "scale(1.1)";
        element.innerHTML = "I am Selected!";
      }
    </script>
  </body>
</html>
