<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 50px;
      }
      #box1,
      #box2,
      #box3 {
        height: 200px;
        width: 200px;
        border: 1px solid white;
        border-radius: 20px;
        color: white;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="box1" onclick="handle(this)">Click to change random color</div>
    <div id="box2" onclick="handle(this)">Click to change random color</div>
    <div id="box3" onclick="handle(this)">Click to change random color</div>

    <script>
      function handle(element) {
        const backColor =
          "#" + Math.floor(Math.random() * 16777215).toString(16);

        const fontColor =
          "#" + Math.floor(Math.random() * 16777215).toString(16);

        element.style.backgroundColor = backColor;
        element.style.color = fontColor;
      }
    </script>
  </body>
</html>
